apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Values.namespace }}
spec:
  selector: { app: {{ .Chart.Name }}, slot: {{ .Values.bluegreen.slot }} }   # flip slot for Blue-Green cutover
  ports: [{ port: {{ .Values.service.port }}, targetPort: {{ .Values.service.port }} }]
