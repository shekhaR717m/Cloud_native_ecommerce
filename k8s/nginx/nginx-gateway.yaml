apiVersion: v1
kind: Namespace
metadata: { name: gateway }
---
apiVersion: v1
kind: ConfigMap
metadata: { name: nginx-conf, namespace: gateway }
data:
  nginx.conf: |
    worker_processes auto;
    events { worker_connections 1024; }
    http {
      limit_req_zone $binary_remote_addr zone=api:10m rate=200r/s;
      upstream user_svc         { server user.default.svc.cluster.local:3001; }
      upstream product_svc      { server product.default.svc.cluster.local:3002; }
      upstream order_svc        { server order.default.svc.cluster.local:3003; }
      upstream payment_svc      { server payment.payment.svc.cluster.local:3004; }
      upstream notification_svc { server notification.default.svc.cluster.local:3005; }
      server {
        listen 443 ssl http2;
        ssl_certificate     /etc/nginx/tls/tls.crt;
        ssl_certificate_key /etc/nginx/tls/tls.key;
        location /api/users/    { limit_req zone=api burst=100; proxy_pass http://user_svc/; }
        location /api/products/ { limit_req zone=api burst=100; proxy_pass http://product_svc/; }
        location /api/orders/   { limit_req zone=api burst=100; proxy_pass http://order_svc/; }
        location /api/payments/ { limit_req zone=api burst=20;  proxy_pass http://payment_svc/; }
        location /api/notify/   { limit_req zone=api burst=100; proxy_pass http://notification_svc/; }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: nginx-gateway, namespace: gateway }
spec:
  replicas: 3
  selector: { matchLabels: { app: nginx-gateway } }
  template:
    metadata: { labels: { app: nginx-gateway } }
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports: [{ containerPort: 443 }]
          volumeMounts:
            - { name: conf, mountPath: /etc/nginx/nginx.conf, subPath: nginx.conf }
            - { name: tls,  mountPath: /etc/nginx/tls, readOnly: true }
      volumes:
        - { name: conf, configMap: { name: nginx-conf } }
        - { name: tls,  secret: { secretName: gateway-tls } }
---
apiVersion: v1
kind: Service
metadata: { name: nginx-gateway, namespace: gateway }
spec:
  type: LoadBalancer
  selector: { app: nginx-gateway }
  ports: [{ port: 443, targetPort: 443 }]
