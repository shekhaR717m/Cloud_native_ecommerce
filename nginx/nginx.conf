worker_processes auto;
events { worker_connections 1024; }
http {
  # ---- Rate limiting ----
  limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;

  upstream user_svc         { server user:3001;         } # weighted LB ready: add `weight=N`
  upstream product_svc      { server product:3002;      }
  upstream order_svc        { server order:3003;        }
  upstream payment_svc      { server payment:3004;      }
  upstream notification_svc { server notification:3005; }

  server {
    listen 80;
    # listen 443 ssl;  # SSL termination in prod
    # ssl_certificate     /etc/nginx/tls/tls.crt;
    # ssl_certificate_key /etc/nginx/tls/tls.key;

    location /api/users/        { limit_req zone=api burst=50; proxy_pass http://user_svc/;         }
    location /api/products/     { limit_req zone=api burst=50; proxy_pass http://product_svc/;      }
    location /api/orders/       { limit_req zone=api burst=50; proxy_pass http://order_svc/;        }
    location /api/payments/     { limit_req zone=api burst=20; proxy_pass http://payment_svc/;      }
    location /api/notify/       { limit_req zone=api burst=50; proxy_pass http://notification_svc/; }
    location /health            { return 200 "ok"; }
  }
}
